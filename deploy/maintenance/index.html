<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统维护中</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      main {
        width: min(520px, calc(100% - 48px));
        padding: 40px;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        background: #fff;
        box-shadow: 0 18px 48px rgb(15 23 42 / 8%);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>系统维护中</h1>
      <p>管理员正在执行数据维护，请稍后刷新页面。维护完成后可继续使用原账号和原密码登录。</p>
    </main>
  </body>
</html>

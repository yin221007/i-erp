version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ierp-backend
    restart: always
    environment:
      - DB_HOST=192.168.100.8
      - DB_USER=yinierp
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=ierp
      - DB_PORT=3306
      - PORT=3000
      - TRUST_PROXY=1
      - PUBLIC_ORIGINS=${PUBLIC_ORIGINS}
      - SESSION_SECRET=${SESSION_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TZ=Asia/Shanghai
    volumes:
      - /volume2/docker/ierp/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ierp-frontend
    restart: always
    ports:
      - "10666:80"
    volumes:
      - /volume2/docker/ierp/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai

networks:
  default:
    name: ierp-net
    driver: bridge

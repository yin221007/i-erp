version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ierp-backend
    restart: always
    environment:
      - DB_HOST=192.168.100.8
      - DB_USER=yinierp
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=ierp
      - DB_PORT=3306
      - PORT=3000
      - TRUST_PROXY=1
      - PUBLIC_ORIGINS=${PUBLIC_ORIGINS}
      - SESSION_SECRET=${SESSION_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - UPLOAD_DIR=/app/uploads
      - UPLOAD_MAX_BYTES=104857600
      - TZ=Asia/Shanghai
    volumes:
      - /volume2/docker/ierp/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ierp-frontend
    restart: always
    ports:
      - "10666:80"
    volumes:
      - /volume2/docker/ierp/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    profiles:
      - backup
    restart: "no"
    mem_limit: 512m
    cpus: 1.0
    environment:
      - DB_HOST=192.168.100.8
      - DB_USER=yinierp
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=ierp
      - DB_PORT=3306
      - BACKUP_ROOT=/backups
      - UPLOADS_ROOT=/data/uploads
      - DEPLOY_ROOT=/data/deploy
      - BACKUP_KIND=${BACKUP_KIND:-daily}
      - BACKUP_CAPACITY_BYTES=536870912000
      - MIN_FREE_BYTES=21474836480
      - MIN_FREE_PERCENT=10
      - TZ=Asia/Shanghai
    volumes:
      - /volume2/docker/ierp-backups:/backups
      - /volume2/docker/ierp/uploads:/data/uploads:ro
      - /volume2/docker/ierp:/data/deploy:ro

networks:
  default:
    name: ierp-net
    driver: bridge
